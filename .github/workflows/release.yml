name: Release

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Build, attest, and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate release version
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');

          const tag = process.env.GITHUB_REF_NAME;
          const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const versions = JSON.parse(fs.readFileSync('versions.json', 'utf8'));

          if (!/^\d+\.\d+\.\d+$/.test(tag)) {
            throw new Error(`Release tag must use x.y.z format, got ${tag}`);
          }

          if (manifest.version !== tag) {
            throw new Error(`manifest.json version ${manifest.version} does not match tag ${tag}`);
          }

          if (pkg.version !== tag) {
            throw new Error(`package.json version ${pkg.version} does not match tag ${tag}`);
          }

          if (!Object.prototype.hasOwnProperty.call(versions, tag)) {
            throw new Error(`versions.json is missing an entry for ${tag}`);
          }
          NODE

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Build release assets
        run: npm run build

      - name: Check bundled JavaScript syntax
        run: node --check main.js

      - name: Validate release assets
        shell: bash
        run: |
          test -f main.js
          test -f manifest.json
          test -f styles.css

      - name: Attest main.js
        uses: actions/attest@v4
        with:
          subject-path: main.js

      - name: Attest manifest.json
        uses: actions/attest@v4
        with:
          subject-path: manifest.json

      - name: Attest styles.css
        uses: actions/attest@v4
        with:
          subject-path: styles.css

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Mermaid Fixer ${{ github.ref_name }}
          body: |
            Release assets for Obsidian:
            - main.js
            - manifest.json
            - styles.css

            This release was built by GitHub Actions and includes artifact attestations for the release assets.
          fail_on_unmatched_files: true
          files: |
            main.js
            manifest.json
            styles.css
